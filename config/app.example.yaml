app:
  name: Ubuntu Ops Control Console
  environment: local
  bind_host: 127.0.0.1
  api_port: 8000
  agent_port: 8787

database:
  url: sqlite:///./data/uocc.sqlite3

agent:
  base_url: http://agent:8787
  mode: auto
  timeout_seconds: 5
  backend: demo

logs:
  default_lines: 200
  max_lines: 1000

security:
  expose_publicly: false
  destructive_operations_enabled: false

